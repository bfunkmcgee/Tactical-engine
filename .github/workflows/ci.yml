name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Guard against tracked node_modules
        run: |
          if git ls-files | grep -qE '(^|/)node_modules/'; then
            echo 'Error: tracked node_modules directories detected.'
            git ls-files | grep -E '(^|/)node_modules/'
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          npm install --prefix apps/web-client --no-audit --no-fund

      - name: Typecheck and test gate
        run: npm run ci
